<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#0d0d0d"/>
  <!-- Room in perspective -->
  <!-- Floor -->
  <path d="M80 390 L400 280 L720 390 Z" fill="#141414" stroke="#1e1e1e" stroke-width="1"/>
  <!-- Back wall -->
  <path d="M80 390 L200 120 L600 120 L720 390 Z" fill="#111" stroke="#1e1e1e" stroke-width="1"/>
  <!-- Left wall -->
  <path d="M80 390 L200 120 L400 280 Z" fill="#0f0f0f" stroke="#1e1e1e" stroke-width="1"/>
  <!-- Right wall -->
  <path d="M720 390 L600 120 L400 280 Z" fill="#131313" stroke="#1e1e1e" stroke-width="1"/>
  <!-- Ceiling -->
  <path d="M200 120 L600 120 L400 30 Z" fill="#111" stroke="#1e1e1e" stroke-width="1"/>
  <!-- Left speaker -->
  <rect x="115" y="290" width="50" height="80" rx="3" fill="#1e1e1e" stroke="#2a2a2a" stroke-width="1"/>
  <circle cx="140" cy="315" r="14" fill="#141414" stroke="#2a2a2a" stroke-width="1"/>
  <circle cx="140" cy="345" r="10" fill="#141414" stroke="#2a2a2a" stroke-width="1"/>
  <!-- Right speaker -->
  <rect x="635" y="290" width="50" height="80" rx="3" fill="#1e1e1e" stroke="#2a2a2a" stroke-width="1"/>
  <circle cx="660" cy="315" r="14" fill="#141414" stroke="#2a2a2a" stroke-width="1"/>
  <circle cx="660" cy="345" r="10" fill="#141414" stroke="#2a2a2a" stroke-width="1"/>
  <!-- Listening chair -->
  <rect x="360" y="340" width="80" height="45" rx="4" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
  <rect x="355" y="310" width="90" height="35" rx="4" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
  <!-- Sound waves from left speaker (reflecting) -->
  <path d="M165 320 Q240 260 320 300" stroke="#c9a84c" stroke-width="1.2" fill="none" opacity="0.5" stroke-linecap="round"/>
  <path d="M165 320 Q180 240 250 200 Q320 170 350 230" stroke="#c9a84c" stroke-width="1" fill="none" opacity="0.25" stroke-linecap="round" stroke-dasharray="4,4"/>
  <!-- Sound waves from right speaker (reflecting) -->
  <path d="M635 320 Q560 260 480 300" stroke="#c9a84c" stroke-width="1.2" fill="none" opacity="0.5" stroke-linecap="round"/>
  <path d="M635 320 Q620 240 550 200 Q480 170 450 230" stroke="#c9a84c" stroke-width="1" fill="none" opacity="0.25" stroke-linecap="round" stroke-dasharray="4,4"/>
  <!-- Acoustic panels on wall -->
  <rect x="225" y="145" width="35" height="70" rx="3" fill="#1e1e14" stroke="#3a3a28" stroke-width="1" opacity="0.8"/>
  <rect x="540" y="145" width="35" height="70" rx="3" fill="#1e1e14" stroke="#3a3a28" stroke-width="1" opacity="0.8"/>
  <!-- Panel texture lines -->
  <line x1="228" y1="155" x2="257" y2="155" stroke="#2a2a1e" stroke-width="1"/>
  <line x1="228" y1="165" x2="257" y2="165" stroke="#2a2a1e" stroke-width="1"/>
  <line x1="228" y1="175" x2="257" y2="175" stroke="#2a2a1e" stroke-width="1"/>
  <line x1="228" y1="185" x2="257" y2="185" stroke="#2a2a1e" stroke-width="1"/>
  <line x1="543" y1="155" x2="572" y2="155" stroke="#2a2a1e" stroke-width="1"/>
  <line x1="543" y1="165" x2="572" y2="165" stroke="#2a2a1e" stroke-width="1"/>
  <line x1="543" y1="175" x2="572" y2="175" stroke="#2a2a1e" stroke-width="1"/>
  <line x1="543" y1="185" x2="572" y2="185" stroke="#2a2a1e" stroke-width="1"/>
  <!-- Bass trap corner indicators -->
  <polygon points="200,120 220,120 200,160" fill="#1e1e14" stroke="#3a3a28" stroke-width="1" opacity="0.7"/>
  <polygon points="600,120 580,120 600,160" fill="#1e1e14" stroke="#3a3a28" stroke-width="1" opacity="0.7"/>
  <!-- Equilateral triangle = listening triangle label -->
  <line x1="140" y1="325" x2="400" y2="362" stroke="#c9a84c" stroke-width="0.8" stroke-dasharray="3,4" opacity="0.35"/>
  <line x1="660" y1="325" x2="400" y2="362" stroke="#c9a84c" stroke-width="0.8" stroke-dasharray="3,4" opacity="0.35"/>
  <line x1="140" y1="325" x2="660" y2="325" stroke="#c9a84c" stroke-width="0.8" stroke-dasharray="3,4" opacity="0.35"/>
</svg>