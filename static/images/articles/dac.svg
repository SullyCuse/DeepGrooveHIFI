<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#141414"/>
  <!-- Grid background -->
  <line x1="0" y1="150" x2="800" y2="150" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="200" y1="0" x2="200" y2="450" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="450" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="450" stroke="#1a1a1a" stroke-width="1"/>
  <!-- DAC chip -->
  <rect x="290" y="150" width="220" height="150" rx="6" fill="#181818" stroke="#c9a84c" stroke-width="1.5"/>
  <!-- Chip label -->
  <text x="400" y="228" text-anchor="middle" font-family="monospace" font-size="14" fill="#c9a84c" letter-spacing="2">D/A</text>
  <text x="400" y="248" text-anchor="middle" font-family="monospace" font-size="10" fill="#555" letter-spacing="1">CONVERTER</text>
  <!-- Left pins (digital in) -->
  <line x1="250" y1="185" x2="290" y2="185" stroke="#5a8db5" stroke-width="2"/>
  <line x1="250" y1="205" x2="290" y2="205" stroke="#5a8db5" stroke-width="2"/>
  <line x1="250" y1="225" x2="290" y2="225" stroke="#5a8db5" stroke-width="2"/>
  <line x1="250" y1="245" x2="290" y2="245" stroke="#5a8db5" stroke-width="2"/>
  <line x1="250" y1="265" x2="290" y2="265" stroke="#5a8db5" stroke-width="2"/>
  <!-- Right pins (analog out) -->
  <line x1="510" y1="185" x2="550" y2="185" stroke="#c9a84c" stroke-width="2"/>
  <line x1="510" y1="205" x2="550" y2="205" stroke="#c9a84c" stroke-width="2"/>
  <line x1="510" y1="225" x2="550" y2="225" stroke="#c9a84c" stroke-width="2"/>
  <line x1="510" y1="245" x2="550" y2="245" stroke="#c9a84c" stroke-width="2"/>
  <line x1="510" y1="265" x2="550" y2="265" stroke="#c9a84c" stroke-width="2"/>
  <!-- Digital signal (square wave, left) -->
  <polyline points="100,215 130,215 130,185 160,185 160,215 190,215 190,185 220,185 220,215 250,215"
            stroke="#5a8db5" stroke-width="2" fill="none"/>
  <!-- Analog signal (sine wave, right) -->
  <path d="M550 225 Q565 195 580 225 Q595 255 610 225 Q625 195 640 225 Q655 255 670 225 Q685 195 700 225"
        stroke="#c9a84c" stroke-width="2" fill="none"/>
  <!-- Labels -->
  <text x="170" y="310" text-anchor="middle" font-family="monospace" font-size="11" fill="#5a8db5" opacity="0.8">DIGITAL IN</text>
  <text x="625" y="310" text-anchor="middle" font-family="monospace" font-size="11" fill="#c9a84c" opacity="0.8">ANALOG OUT</text>
  <!-- Glow effect -->
  <ellipse cx="400" cy="225" rx="130" ry="90" fill="#c9a84c" opacity="0.03"/>
</svg>