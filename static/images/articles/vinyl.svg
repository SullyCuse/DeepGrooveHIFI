  <circle cx="400" cy="225" r="94"  stroke="#1c1c1c" stroke-width="0.8"/>
  <circle cx="400" cy="225" r="87"  stroke="#1a1a1a" stroke-width="0.8"/>
  <circle cx="400" cy="225" r="80"  stroke="#1c1c1c" stroke-width="0.8"/>
  <!-- Label area -->
  <circle cx="400" cy="225" r="72" fill="#1a1208"/>
  <circle cx="400" cy="225" r="72" stroke="#c9a84c" stroke-width="1" opacity="0.5"/>
  <!-- Label text -->
  <text x="400" y="215" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#c9a84c" letter-spacing="2" font-weight="700">DEEP GROOVE</text>
  <text x="400" y="232" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#888" letter-spacing="1">HiFi Records</text>
  <line x1="370" y1="241" x2="430" y2="241" stroke="#c9a84c" stroke-width="0.5" opacity="0.4"/>
  <text x="400" y="252" text-anchor="middle" font-family="monospace" font-size="7" fill="#666" letter-spacing="0.5">33 1/3 RPM</text>
  <!-- Center spindle -->
  <circle cx="400" cy="225" r="5" fill="#c9a84c" opacity="0.7"/>
  <!-- Light reflection arc -->
  <path d="M 255 130 A 190 190 0 0 1 480 88" stroke="white" stroke-width="6" fill="none" opacity="0.04" stroke-linecap="round"/>
