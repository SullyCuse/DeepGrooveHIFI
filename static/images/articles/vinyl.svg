  <circle cx="400" cy="225" r="171" stroke="#1a1a1a" stroke-width="0.8"/>
  <circle cx="400" cy="225" r="164" stroke="#1c1c1c" stroke-width="0.8"/>
  <circle cx="400" cy="225" r="157" stroke="#1a1a1a" stroke-width="0.8"/>
  <circle cx="400" cy="225" r="150" stroke="#1c1c1c" stroke-width="0.8"/>
  <circle cx="400" cy="225" r="143" stroke="#1a1a1a" stroke-width="0.8"/>
  <circle cx="400" cy="225" r="136" stroke="#1c1c1c" stroke-width="0.8"/>
  <circle cx="400" cy="225" r="129" stroke="#1a1a1a" stroke-width="0.8"/>
  <circle cx="400" cy="225" r="122" stroke="#1c1c1c" stroke-width="0.8"/>
