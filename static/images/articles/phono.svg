<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#0d0d0d"/>
  <!-- Record groove cross-section background -->
  <path d="M0 350 L800 350" stroke="#1a1a1a" stroke-width="1"/>
  <!-- Groove walls (V-shape cross sections) -->
  <path d="M200 350 L240 250 L280 350" stroke="#2a2a2a" stroke-width="1" fill="#161616"/>
  <path d="M280 350 L320 250 L360 350" stroke="#2a2a2a" stroke-width="1" fill="#1a1a1a"/>
  <path d="M360 350 L400 250 L440 350" stroke="#2a2a2a" stroke-width="1" fill="#161616"/>
  <path d="M440 350 L480 250 L520 350" stroke="#2a2a2a" stroke-width="1" fill="#1a1a1a"/>
  <path d="M520 350 L560 250 L600 350" stroke="#2a2a2a" stroke-width="1" fill="#161616"/>
  <!-- Tonearm / cantilever -->
  <rect x="340" y="80" width="120" height="30" rx="4" fill="#222" stroke="#444" stroke-width="1"/>
  <text x="400" y="101" text-anchor="middle" font-family="monospace" font-size="9" fill="#888">PHONO CART</text>
  <!-- Cantilever beam -->
  <line x1="400" y1="110" x2="400" y2="248" stroke="#888" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Stylus tip -->
  <polygon points="394,248 406,248 400,262" fill="#c9a84c"/>
  <!-- Stylus in groove -->
  <circle cx="400" cy="262" r="4" fill="#c9a84c" opacity="0.8"/>
  <circle cx="400" cy="262" r="8" fill="#c9a84c" opacity="0.1"/>
  <!-- Waveform output (left channel) -->
  <path d="M160 160 Q175 130 190 160 Q205 190 220 160 Q235 130 250 160 Q265 190 280 160 Q295 130 310 160"
        stroke="#5a8db5" stroke-width="2" fill="none" opacity="0.8"/>
  <text x="235" y="200" text-anchor="middle" font-family="monospace" font-size="10" fill="#5a8db5" opacity="0.7">L</text>
  <!-- Waveform output (right channel) -->
  <path d="M490 160 Q505 130 520 160 Q535 190 550 160 Q565 130 580 160 Q595 190 610 160 Q625 130 640 160"
        stroke="#c9a84c" stroke-width="2" fill="none" opacity="0.8"/>
  <text x="565" y="200" text-anchor="middle" font-family="monospace" font-size="10" fill="#c9a84c" opacity="0.7">R</text>
  <!-- Arrows showing signal path -->
  <line x1="310" y1="160" x2="335" y2="130" stroke="#555" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="490" y1="160" x2="465" y2="130" stroke="#555" stroke-width="1" stroke-dasharray="3,3"/>
  <!-- Phono preamp box -->
  <rect x="310" y="50" width="180" height="60" rx="5" fill="#181818" stroke="#c9a84c" stroke-width="1" opacity="0.8"/>
  <text x="400" y="76" text-anchor="middle" font-family="monospace" font-size="9" fill="#c9a84c" letter-spacing="1">PHONO STAGE</text>
  <text x="400" y="95" text-anchor="middle" font-family="monospace" font-size="8" fill="#555">RIAA EQ · GAIN</text>
</svg>