<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#0d0d0d"/>
  <!-- Plinth / base -->
  <rect x="100" y="280" width="600" height="120" rx="6" fill="#181818" stroke="#2a2a2a" stroke-width="1"/>
  <rect x="100" y="280" width="600" height="12" rx="4" fill="#222"/>
  <!-- Platter -->
  <ellipse cx="330" cy="280" rx="160" ry="20" fill="#161616" stroke="#2a2a2a" stroke-width="1"/>
  <circle cx="330" cy="260" r="160" fill="#141414" stroke="#252525" stroke-width="1.5"/>
  <!-- Record on platter -->
  <circle cx="330" cy="260" r="148" fill="#0f0f0f"/>
  <circle cx="330" cy="260" r="148" stroke="#1a1a1a" stroke-width="1"/>
  <circle cx="330" cy="260" r="141" stroke="#1c1c1c" stroke-width="0.7"/>
  <circle cx="330" cy="260" r="134" stroke="#1a1a1a" stroke-width="0.7"/>
  <circle cx="330" cy="260" r="127" stroke="#1c1c1c" stroke-width="0.7"/>
  <circle cx="330" cy="260" r="120" stroke="#1a1a1a" stroke-width="0.7"/>
  <circle cx="330" cy="260" r="113" stroke="#1c1c1c" stroke-width="0.7"/>
  <circle cx="330" cy="260" r="106" stroke="#1a1a1a" stroke-width="0.7"/>
  <circle cx="330" cy="260" r="99"  stroke="#1c1c1c" stroke-width="0.7"/>
  <circle cx="330" cy="260" r="70" fill="#1a1208" stroke="#c9a84c" stroke-width="0.8" opacity="0.6"/>
  <circle cx="330" cy="260" r="6" fill="#c9a84c" opacity="0.7"/>
  <!-- Tonearm base -->
  <circle cx="570" cy="310" r="18" fill="#222" stroke="#3a3a3a" stroke-width="1.5"/>
  <circle cx="570" cy="310" r="8"  fill="#333"/>
  <!-- Tonearm tube -->
  <line x1="570" y1="298" x2="390" y2="170" stroke="#3a3a3a" stroke-width="6" stroke-linecap="round"/>
  <line x1="570" y1="298" x2="390" y2="170" stroke="#555" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <!-- Headshell -->
  <rect x="370" y="158" width="40" height="22" rx="4" fill="#333" stroke="#555" stroke-width="1" transform="rotate(-30 390 169)"/>
  <!-- Stylus -->
  <line x1="378" y1="178" x2="374" y2="192" stroke="#c9a84c" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Counterweight -->
  <rect x="558" y="292" width="28" height="14" rx="3" fill="#404040" stroke="#555" stroke-width="1" transform="rotate(30 572 299)"/>
  <!-- Speed buttons -->
  <rect x="550" y="345" width="30" height="14" rx="2" fill="#222" stroke="#444" stroke-width="1"/>
  <text x="565" y="356" text-anchor="middle" font-family="monospace" font-size="7" fill="#888">33</text>
  <rect x="588" y="345" width="30" height="14" rx="2" fill="#222" stroke="#444" stroke-width="1"/>
  <text x="603" y="356" text-anchor="middle" font-family="monospace" font-size="7" fill="#666">45</text>
  <!-- Power LED -->
  <circle cx="140" cy="355" r="5" fill="#c9a84c" opacity="0.8"/>
  <circle cx="140" cy="355" r="9" fill="#c9a84c" opacity="0.08"/>
  <!-- Feet -->
  <ellipse cx="150" cy="400" rx="20" ry="6" fill="#111" stroke="#222" stroke-width="1"/>
  <ellipse cx="650" cy="400" rx="20" ry="6" fill="#111" stroke="#222" stroke-width="1"/>
</svg>