<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#141414"/>
  <!-- Left speaker cabinet -->
  <rect x="80" y="80" width="220" height="320" rx="6" fill="#181818" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Left woofer surround -->
  <circle cx="190" cy="220" r="88" fill="#111" stroke="#2a2a2a" stroke-width="1.5"/>
  <circle cx="190" cy="220" r="80" fill="#141414" stroke="#333" stroke-width="1"/>
  <circle cx="190" cy="220" r="68" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
  <!-- Woofer cone rings -->
  <circle cx="190" cy="220" r="58" stroke="#222" stroke-width="0.8"/>
  <circle cx="190" cy="220" r="48" stroke="#222" stroke-width="0.8"/>
  <circle cx="190" cy="220" r="38" stroke="#222" stroke-width="0.8"/>
  <circle cx="190" cy="220" r="26" fill="#222" stroke="#333" stroke-width="1"/>
  <!-- Dust cap -->
  <circle cx="190" cy="220" r="14" fill="#2a2a2a" stroke="#3a3a3a" stroke-width="1"/>
  <!-- Left tweeter -->
  <circle cx="190" cy="120" r="22" fill="#111" stroke="#2a2a2a" stroke-width="1"/>
  <circle cx="190" cy="120" r="14" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <circle cx="190" cy="120" r="7"  fill="#222"/>
  <!-- Bass port -->
  <rect x="150" y="355" width="80" height="22" rx="11" fill="#111" stroke="#2a2a2a" stroke-width="1"/>
  <!-- Right speaker cabinet -->
  <rect x="500" y="80" width="220" height="320" rx="6" fill="#181818" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Right woofer -->
  <circle cx="610" cy="220" r="88" fill="#111" stroke="#2a2a2a" stroke-width="1.5"/>
  <circle cx="610" cy="220" r="80" fill="#141414" stroke="#333" stroke-width="1"/>
  <circle cx="610" cy="220" r="68" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
  <circle cx="610" cy="220" r="58" stroke="#222" stroke-width="0.8"/>
  <circle cx="610" cy="220" r="48" stroke="#222" stroke-width="0.8"/>
  <circle cx="610" cy="220" r="38" stroke="#222" stroke-width="0.8"/>
  <circle cx="610" cy="220" r="26" fill="#222" stroke="#333" stroke-width="1"/>
  <circle cx="610" cy="220" r="14" fill="#2a2a2a" stroke="#3a3a3a" stroke-width="1"/>
  <!-- Right tweeter -->
  <circle cx="610" cy="120" r="22" fill="#111" stroke="#2a2a2a" stroke-width="1"/>
  <circle cx="610" cy="120" r="14" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <circle cx="610" cy="120" r="7"  fill="#222"/>
  <!-- Bass port -->
  <rect x="570" y="355" width="80" height="22" rx="11" fill="#111" stroke="#2a2a2a" stroke-width="1"/>
  <!-- Sound waves from left speaker -->
  <path d="M300 160 Q340 220 300 280" stroke="#c9a84c" stroke-width="1.5" fill="none" opacity="0.5" stroke-linecap="round"/>
  <path d="M320 140 Q375 220 320 300" stroke="#c9a84c" stroke-width="1.2" fill="none" opacity="0.3" stroke-linecap="round"/>
  <path d="M340 120 Q410 220 340 320" stroke="#c9a84c" stroke-width="1"   fill="none" opacity="0.15" stroke-linecap="round"/>
  <!-- Sound waves from right speaker -->
  <path d="M500 160 Q460 220 500 280" stroke="#c9a84c" stroke-width="1.5" fill="none" opacity="0.5" stroke-linecap="round"/>
  <path d="M480 140 Q425 220 480 300" stroke="#c9a84c" stroke-width="1.2" fill="none" opacity="0.3" stroke-linecap="round"/>
  <path d="M460 120 Q390 220 460 320" stroke="#c9a84c" stroke-width="1"   fill="none" opacity="0.15" stroke-linecap="round"/>
</svg>