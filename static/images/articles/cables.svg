<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#141414"/>
  <!-- Divider line -->
  <line x1="400" y1="60" x2="400" y2="390" stroke="#1e1e1e" stroke-width="1" stroke-dasharray="6,4"/>
  <!-- XLR side label -->
  <text x="200" y="90" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#c9a84c" letter-spacing="2">XLR</text>
  <text x="200" y="108" text-anchor="middle" font-family="monospace" font-size="9" fill="#555" letter-spacing="1">BALANCED</text>
  <!-- RCA side label -->
  <text x="600" y="90" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#888" letter-spacing="2">RCA</text>
  <text x="600" y="108" text-anchor="middle" font-family="monospace" font-size="9" fill="#555" letter-spacing="1">UNBALANCED</text>
  <!-- XLR Connector body -->
  <rect x="100" y="175" width="100" height="100" rx="8" fill="#1e1e1e" stroke="#3a3a3a" stroke-width="1.5"/>
  <ellipse cx="150" cy="225" rx="42" ry="42" fill="#181818" stroke="#333" stroke-width="1"/>
  <!-- XLR pins (3-pin pattern) -->
  <circle cx="150" cy="205" r="7" fill="#888" stroke="#aaa" stroke-width="1"/>
  <text x="150" y="209" text-anchor="middle" font-family="monospace" font-size="7" fill="#333">1</text>
  <circle cx="133" cy="235" r="7" fill="#888" stroke="#aaa" stroke-width="1"/>
  <text x="133" y="239" text-anchor="middle" font-family="monospace" font-size="7" fill="#333">2</text>
  <circle cx="167" cy="235" r="7" fill="#888" stroke="#aaa" stroke-width="1"/>
  <text x="167" y="239" text-anchor="middle" font-family="monospace" font-size="7" fill="#333">3</text>
  <!-- Cable from XLR -->
  <rect x="200" y="213" width="130" height="24" rx="12" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
  <!-- Wire strands inside XLR cable -->
  <line x1="205" y1="222" x2="325" y2="222" stroke="#c9a84c" stroke-width="1.5" opacity="0.7"/>
  <line x1="205" y1="225" x2="325" y2="225" stroke="#5a8db5" stroke-width="1.5" opacity="0.7"/>
  <line x1="205" y1="228" x2="325" y2="228" stroke="#555"   stroke-width="1"   opacity="0.5"/>
  <!-- Pin labels -->
  <text x="150" y="290" text-anchor="middle" font-family="monospace" font-size="9" fill="#555">GND · HOT · COLD</text>
  <!-- RCA Connector -->
  <circle cx="600" cy="225" r="50" fill="#1e1e1e" stroke="#3a3a3a" stroke-width="1.5"/>
  <circle cx="600" cy="225" r="35" fill="#181818" stroke="#333" stroke-width="1"/>
  <!-- RCA center pin -->
  <circle cx="600" cy="225" r="10" fill="#c9a84c" stroke="#e5c96a" stroke-width="1"/>
  <!-- RCA shield ring -->
  <circle cx="600" cy="225" r="28" fill="none" stroke="#555" stroke-width="3"/>
  <!-- Cable from RCA -->
  <rect x="470" y="213" width="130" height="24" rx="12" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="475" y1="225" x2="595" y2="225" stroke="#c9a84c" stroke-width="2" opacity="0.7"/>
  <line x1="475" y1="219" x2="595" y2="219" stroke="#333" stroke-width="5" opacity="0.4"/>
  <!-- Pin labels -->
  <text x="600" y="295" text-anchor="middle" font-family="monospace" font-size="9" fill="#555">GND · SIGNAL</text>
  <!-- Noise floor illustration at bottom -->
  <text x="200" y="370" text-anchor="middle" font-family="monospace" font-size="9" fill="#c9a84c" opacity="0.7">CMR: ~80dB rejection</text>
  <text x="600" y="370" text-anchor="middle" font-family="monospace" font-size="9" fill="#888" opacity="0.7">susceptible to interference</text>
</svg>