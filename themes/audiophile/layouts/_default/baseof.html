<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">

  <!-- Primary Meta -->
  <title>{{ if .IsHome }}{{ .Site.Title }} — Audiophile Reviews & Guides{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ if .Description }}{{ .Description }}{{ else if .Summary }}{{ .Summary | plainify | truncate 160 }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta name="author" content="{{ .Site.Params.author }}">

  <!-- Canonical -->
  <!-- Favicons -->
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
  <link rel="apple-touch-icon" href="/favicon.png">

  <link rel="canonical" href="{{ .Permalink }}">

  <!-- Open Graph -->
  <meta property="og:title"       content="{{ .Title }}">
  <meta property="og:description" content="{{ if .Description }}{{ .Description }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta property="og:url"         content="{{ .Permalink }}">
  <meta property="og:site_name"   content="{{ .Site.Title }}">
  <meta property="og:type"        content="{{ if .IsPage }}article{{ else }}website{{ end }}">

  <!-- Twitter Card -->
  <meta name="twitter:card"        content="summary_large_image">
  <meta name="twitter:title"       content="{{ .Title }}">
  <meta name="twitter:description" content="{{ if .Description }}{{ .Description }}{{ else }}{{ .Site.Params.description }}{{ end }}">

  <!-- Fonts (Google Fonts) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="/css/main.css">

  <!-- Reading progress bar style -->
  <style>
    .reading-progress {
      position: fixed; top: 0; left: 0; height: 3px;
      background: var(--accent); z-index: 200;
      width: 0; transition: width .1s linear;
    }
  </style>

  <!-- Google AdSense -->
  {{ if .Site.Params.adsenseID }}
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client={{ .Site.Params.adsenseID }}"
     crossorigin="anonymous"></script>
  {{ end }}

</head>
<body>

  <!-- Reading progress (article pages only) -->
  {{ if .IsPage }}<div class="reading-progress"></div>{{ end }}

  <!-- Navigation -->
  {{ partial "header.html" . }}

  <!-- Main content -->
  <main>
    {{ block "main" . }}{{ end }}
  </main>

  <!-- Footer -->
  {{ partial "footer.html" . }}

  <!-- Cookie consent -->
  {{ partial "cookie-consent.html" . }}

  <!-- Scripts -->
  <script src="/js/main.js" defer></script>

</body>
</html>
